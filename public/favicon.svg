<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(0,72%,45%)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="hsl(0,72%,45%)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="hsl(0,45%,28%)"/>
      <stop offset="60%" stop-color="hsl(0,35%,14%)"/>
      <stop offset="100%" stop-color="hsl(0,25%,6%)"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="hsl(0,60%,50%)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="hsl(0,60%,50%)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient glow -->
  <circle cx="16" cy="16" r="15" fill="url(#glow)"/>
  <!-- orb body -->
  <circle cx="16" cy="16" r="13" fill="url(#orb)"/>
  <!-- specular highlight -->
  <circle cx="16" cy="16" r="13" fill="url(#highlight)"/>
</svg>
